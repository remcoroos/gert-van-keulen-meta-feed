name: Daily Feed Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI or API

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'gertvankeulen-meta-feed/package-lock.json'

      - name: Install dependencies
        run: |
          cd gertvankeulen-meta-feed
          npm install

      - name: Run Feed Processor
        env:
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          EXCLUDE_PLACEHOLDERS: 'true'
        run: |
          cd gertvankeulen-meta-feed
          node index.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/meta-product-feed.xml public/vehicles.json public/last_updated.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Automatische daily update van Meta feed" && git push)
